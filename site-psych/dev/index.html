<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Кабинет</title>
<link rel="stylesheet" href="./theme.css">
<style>
  /* Ф5: цвета — ТОКЕНАМИ темы (theme.css); здесь только раскладка и привязка к токенам */
  :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
  body { margin: 0; }
  .site { max-width: 72rem; margin: 0 auto; padding: 1rem; }
  .site-banner { color: var(--s-danger); min-height: 1.2rem; margin-bottom: .5rem; }
  .site-login { display: flex; flex-direction: column; gap: .6rem; max-width: 22rem;
                margin: 4rem auto; }
  .site-login input { padding: .45rem .6rem; }
  .site-enter { padding: .45rem; cursor: pointer; }

  .cxm-toolbar { display: flex; gap: .8rem; align-items: center; margin-bottom: .8rem; }
  .cxm-status { color: var(--s-danger); font-size: .9rem; }
  .cxm-cols { display: flex; gap: 1.2rem; align-items: flex-start; }
  .cxm-roster { min-width: 13rem; }
  .cxm-roster ul, .cxm-card ul { list-style: none; padding: 0; margin: .3rem 0; }
  .cxm-roster-btn { width: 100%; text-align: left; padding: .3rem .5rem; cursor: pointer; }
  .cxm-card { flex: 1; }
  .cxm-section { margin-bottom: 1rem; background: var(--s-card); border: 1px solid var(--s-border);
                 border-radius: .5rem; padding: .6rem .8rem; }
  .cxm-section h2 { font-size: 1rem; margin: .1rem 0 .4rem; }
  .cxm-section-head { display: flex; gap: .8rem; align-items: center; }
  .cxm-know, .cxm-ws, .cxm-exp, .cxm-appt, .cxm-episode, .cxm-evidence
    { display: flex; gap: .5rem; align-items: baseline; padding: .25rem 0;
      border-top: 1px dashed var(--s-line); flex-wrap: wrap; }
  .cxm-badge { font-size: .75rem; padding: .05rem .45rem; border-radius: .6rem;
               background: #eee; border: 1px solid #ccc; }
  .cxm-badge-fact { background: #dcefdc; } .cxm-badge-hypothesis { background: #fdf3d7; }
  .cxm-badge-state { background: #dde8f8; } .cxm-badge-trait { background: #f0dff2; }
  .cxm-status-refuted { text-decoration: line-through; }
  .cxm-status-confirmed { background: #cfe8cf; }
  .cxm-conf { font-size: .8rem; color: #667; }
  .cxm-detail { color: #444; }
  .cxm-rev { font-size: .75rem; margin-left: .15rem; cursor: pointer; }
  .cxm-exp-met .cxm-badge { background: #dcefdc; }
  .cxm-exp-unmet .cxm-badge { background: #f6d9d5; }
  .cxm-ws-panel { border-color: #b9c6e0; background: #f4f7fd; }
  .cxm-ws-text { font-weight: 600; }
  .cxm-edit-detail, .cxm-add-obs { display: flex; gap: .5rem; margin-top: .5rem; }
  .cxm-edit-input, .cxm-obs-input { flex: 1; padding: .3rem .5rem; }
  .cxm-evidence-panel { margin-top: .5rem; padding: .4rem .6rem; background: #f7f7f2;
                        border: 1px dashed #ccc; border-radius: .4rem; }
  .cxm-evidence-panel h3 { font-size: .9rem; margin: .1rem 0 .3rem; }
  .cxm-evidence-panel ul { list-style: none; padding: 0; margin: 0; }
  .cxm-rev:disabled, .cxm-obs-add:disabled, .cxm-edit-save:disabled, .cxm-rebuild:disabled
    { opacity: .45; cursor: wait; }

  /* Ф1 «Записи» + Ф2 markdown */
  .site-tabs { display: flex; gap: .6rem; margin-bottom: .8rem; }
  .site-tabs button { padding: .35rem .9rem; cursor: pointer; }
  .site-editor { display: flex; flex-direction: column; gap: .5rem; max-width: 44rem;
                 background: var(--s-card); border: 1px solid var(--s-border); border-radius: .5rem;
                 padding: .8rem; }
  .site-draft { min-height: 7rem; padding: .45rem .6rem; font: inherit; }
  .site-vis, .site-price { max-width: 14rem; padding: .3rem .5rem; }
  .site-publish { align-self: flex-start; padding: .4rem 1rem; cursor: pointer; }
  .site-note { color: var(--s-note); min-height: 1.2rem; margin: .5rem 0; }
  .site-shelve { display: flex; gap: .5rem; margin-bottom: 1rem; }
  .site-shelve input { max-width: 8rem; padding: .3rem .5rem; }
  .cxm-post { border-top: 1px dashed var(--s-line); padding: .5rem 0; list-style: none; }
  .cxm-post-author { font-weight: 600; margin-right: .6rem; }
  .cxm-post-ts { color: var(--s-muted); font-size: .8rem; }
  .cxm-post-teaser { color: var(--s-teaser); font-style: italic; }
  .site-md :is(h1,h2,h3) { margin: .4rem 0 .2rem; }
  .site-md p { margin: .3rem 0; }
  .site-md code { background: var(--s-code-bg); padding: 0 .25rem; border-radius: .2rem; }
  .site-video, .site-youtube { display: block; max-width: 100%; width: 36rem;
                               border: 0; border-radius: .4rem; margin: .4rem 0; }
  .site-youtube { aspect-ratio: 16 / 9; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  import { runReactiveApp } from '/runtime/reactive.js';
  await import('./md-element.mjs');   // <site-markdown>: docsify-стек (marked+DOMPurify)
  const Main = (await import('/_build/jAgda.SitePsych.Main.mjs')).default;
  runReactiveApp(Main, document.getElementById('app'));
  const { mountThemeToggle } = await import('./theme.mjs');
  mountThemeToggle();
</script>
</body>
</html>
