<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>О подходе</title>
<link rel="stylesheet" href="./theme.css">
<style>
  /* docsify-раскладка НА НАШИХ токенах (родные темы docsify не подключаем — тёмная тема
     и брендинг приходят из theme.css бесплатно) */
  :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
  body { margin: 0; }
  .sidebar { position: fixed; top: 0; bottom: 0; left: 0; width: 15rem; overflow-y: auto;
             padding: 1rem; background: var(--s-card); border-right: 1px solid var(--s-border); }
  .sidebar ul { list-style: none; padding: 0 0 0 .4rem; margin: .2rem 0; }
  .sidebar li { margin: .3rem 0; }
  .sidebar a { text-decoration: none; }
  .sidebar .active > a { font-weight: 600; }
  .content { margin-left: 16rem; max-width: 46rem; padding: 1rem 1.4rem; }
  .content :is(h1,h2,h3) { margin: .8rem 0 .4rem; }
  .content code { background: var(--s-code-bg); padding: 0 .25rem; border-radius: .2rem; }
  .content blockquote { border-left: 3px solid var(--s-accent); margin: .6rem 0;
                        padding: .2rem .8rem; color: var(--s-note); }
  .mermaid { background: var(--s-card); border: 1px solid var(--s-border);
             border-radius: .5rem; padding: .6rem; }
  .site-video, .site-youtube { display: block; max-width: 100%; width: 36rem;
                               border: 0; border-radius: .4rem; margin: .4rem 0; }
  .site-youtube { aspect-ratio: 16 / 9; }
  @media (max-width: 48rem) { .sidebar { display: none; } .content { margin-left: 0; } }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  // Docsify-страницы личного сайта («о подходе», услуги; позже — вики тем же способом).
  // Контент-схемы — ТА ЖЕ трансформация, что в <site-markdown>, но роуты ведут на
  // public.html (динамическая половина сайта). Медиа-конфиг зрителя — общий localStorage.
  const { applyContentSchemes } = await import('./md-element.mjs');
  const itok = localStorage.getItem('pub-itok') || '';
  let visitor = localStorage.getItem('pub-visitor') || '';
  window.siteV1 = { base: '', token: itok, channel: 'cookie', id: visitor };

  const PAGE_ROUTES = {
    post: (id) => `public.html#/post/${id}`,
    shelf: (id) => `public.html#/shelf/${id}`,
    thread: (id) => `public.html#/thread/${id}`,
  };

  window.$docsify = {
    el: '#app',
    basePath: 'pages/',
    loadSidebar: true,
    notFoundPage: false,
    plugins: [
      (hook) => {
        // ```mermaid → <div class="mermaid"> (классический рецепт), рендер на doneEach
        hook.afterEach((html, next) => next(html.replace(
          /<pre v-pre data-lang="mermaid"><code class="lang-mermaid">([\s\S]*?)<\/code><\/pre>/g,
          (_, code) => `<div class="mermaid">${code}</div>`)));
        hook.doneEach(() => {
          applyContentSchemes(document.getElementById('app'), { routes: PAGE_ROUTES });
          if (window.mermaid) window.mermaid.init(undefined, document.querySelectorAll('.mermaid'));
        });
      },
    ],
  };

  // docsify/mermaid — классические UMD-скрипты; порядок: конфиг выше уже выставлен
  for (const src of ['./vendor/mermaid.min.js', './vendor/docsify.min.js']) {
    await new Promise((res) => { const s = document.createElement('script');
      s.src = src; s.onload = res; document.body.appendChild(s); });
  }
  window.mermaid?.initialize({ startOnLoad: false, theme: 'neutral' });

  const { mountThemeToggle } = await import('./theme.mjs');
  mountThemeToggle();
</script>
</body>
</html>
